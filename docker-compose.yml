# APIs use MONGO_URI / MONGODB_URI from each service's .env (e.g. Atlas) — same DB as Postman/local npm.
# For a fully local MongoDB instead, use: docker compose -f docker-compose.yml -f docker-compose.local-mongo.yml up
services:
  event-service:
    build:
      context: ./services/event-service
    container_name: event-service
    env_file:
      - ./services/event-service/.env
    environment:
      PORT: "5001"
      # Inside Docker, localhost in .env points at this container — use service DNS names
      AUTH_SERVICE_URL: http://user-management-service:5003
    ports:
      - "5001:5001"
    restart: unless-stopped

  booking-service:
    build:
      context: ./services/booking-service
    container_name: booking-service
    env_file:
      - ./services/booking-service/.env
    environment:
      PORT: "5002"
      EVENT_SERVICE_URL: http://event-service:5001
      AUTH_SERVICE_URL: http://user-management-service:5003
    depends_on:
      - event-service
      - user-management-service
    ports:
      - "5002:5002"
    restart: unless-stopped

  user-management-service:
    build:
      context: ./services/user-management-service
    container_name: user-management-service
    env_file:
      - ./services/user-management-service/.env
    environment:
      PORT: "5003"
    ports:
      - "5003:5003"
    restart: unless-stopped

  customer-review-service:
    build:
      context: ./services/customer-review-service
    container_name: customer-review-service
    env_file:
      - ./services/customer-review-service/.env
    environment:
      PORT: "5004"
      AUTH_SERVICE_URL: http://user-management-service:5003
      EVENT_SERVICE_URL: http://event-service:5001
      BOOKING_SERVICE_URL: http://booking-service:5002
    depends_on:
      - event-service
      - booking-service
      - user-management-service
    ports:
      - "5004:5004"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_EVENT_API_URL: http://localhost:5001/api/events
        REACT_APP_BOOKING_API_URL: http://localhost:5002/api/bookings
        REACT_APP_AUTH_API_URL: http://localhost:5003/api/auth
        REACT_APP_REVIEW_API_URL: http://localhost:5004/api/reviews
    container_name: frontend
    depends_on:
      - event-service
      - booking-service
      - user-management-service
      - customer-review-service
    ports:
      - "3000:3000"
    restart: unless-stopped
