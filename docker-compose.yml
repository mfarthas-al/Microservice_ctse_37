# APIs use MONGO_URI / MONGODB_URI from each service's .env (e.g. Atlas) — same DB as Postman/local npm.
# Browser → api-gateway:8080 → microservices (only gateway + frontend need public ports for typical use).
# For a fully local MongoDB instead, use: docker compose -f docker-compose.yml -f docker-compose.local-mongo.yml up
services:
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:80"
    depends_on:
      - event-service
      - booking-service
      - user-management-service
      - customer-review-service
    restart: unless-stopped

  event-service:
    build:
      context: ./services/event-service
    container_name: event-service
    env_file:
      - ./services/event-service/.env
    environment:
      PORT: "3002"
      # Inside Docker, localhost in .env points at this container — use service DNS names
      AUTH_SERVICE_URL: http://user-management-service:3001
    ports:
      - "3002:3002"
    restart: unless-stopped

  booking-service:
    build:
      context: ./services/booking-service
    container_name: booking-service
    env_file:
      - ./services/booking-service/.env
    environment:
      PORT: "3003"
      EVENT_SERVICE_URL: http://event-service:3002
      AUTH_SERVICE_URL: http://user-management-service:3001
    depends_on:
      - event-service
      - user-management-service
    ports:
      - "3003:3003"
    restart: unless-stopped

  user-management-service:
    build:
      context: ./services/user-management-service
    container_name: user-management-service
    env_file:
      - ./services/user-management-service/.env
    environment:
      PORT: "3001"
    ports:
      - "3001:3001"
    restart: unless-stopped

  customer-review-service:
    build:
      context: ./services/customer-review-service
    container_name: customer-review-service
    env_file:
      - ./services/customer-review-service/.env
    environment:
      PORT: "3004"
      AUTH_SERVICE_URL: http://user-management-service:3001
      EVENT_SERVICE_URL: http://event-service:3002
      BOOKING_SERVICE_URL: http://booking-service:3003
    depends_on:
      - event-service
      - booking-service
      - user-management-service
    ports:
      - "3004:3004"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_GATEWAY_URL: http://localhost:8080
    container_name: frontend
    depends_on:
      - api-gateway
      - event-service
      - booking-service
      - user-management-service
      - customer-review-service
    ports:
      - "3000:3000"
    restart: unless-stopped
