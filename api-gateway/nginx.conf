# Single entry point for browsers; forwards to auth, booking, events, reviews.
#
# --- Toggle: Docker Compose (local) vs AWS-hosted backends ---
# For local compose, use service names (event-service:3002, etc.).
# For testing against services on EC2/public IPs, set the *_HOST blocks below
# and point proxy_pass to those upstreams (or replace inline).
#
# Hosted test URLs (example — replace when IPs change):
#   Auth:    http://13.201.182.152:3001
#   Booking: http://18.141.175.88:3003

upstream auth_upstream {
    server 13.201.182.152:3001;
}

upstream booking_upstream {
    server 18.141.175.88:3003;
}

# Still local Docker / not yet on AWS — switch to upstream blocks when you have URLs
upstream event_upstream {
    server event-service:3002;
}

upstream review_upstream {
    server customer-review-service:3004;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    proxy_hide_header X-Powered-By;
    add_header X-Content-Type-Options nosniff always;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Max-Age 86400 always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;

    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location = / {
        return 200 'api-gateway running';
        add_header Content-Type text/plain;
    }

    location /api/events {
        proxy_pass http://event_upstream;
    }

    location /api/bookings {
        proxy_pass http://booking_upstream;
    }

    location /api/auth {
        proxy_pass http://auth_upstream;
    }

    location /api/reviews {
        proxy_pass http://review_upstream;
    }

    location /api-docs {
        proxy_pass http://auth_upstream;
    }

    location / {
        return 404;
    }
}
