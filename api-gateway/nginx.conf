# Single entry point for browsers; backends stay on the Docker network.
# Forward auth and common headers; CORS for local dev (tighten in production).

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # Hide upstream server names from clients
    proxy_hide_header X-Powered-By;
    add_header X-Content-Type-Options nosniff always;

    # CORS at gateway (tighten Allow-Origin to your domain in production)
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Max-Age 86400 always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;

    # location /api/events {
    #     proxy_pass http://event-service:3002;
    # }

    # location /api/bookings {
    #     proxy_pass http://booking-service:3003;
    # }

    location /api/auth {
        proxy_pass http://3.110.27.117:3001/;
    }

    # location /api/reviews {
    #     proxy_pass http://customer-review-service:3004;
    # }

    location /api-docs {
        proxy_pass http://3.110.27.117:3001/;
    }

    location / {
        return 404;
    }
}
