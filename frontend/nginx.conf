server {
    listen 3000;
    root /usr/share/nginx/html;

    # NOTE (Docker Compose vs AWS hosting)
    #
    # In Docker Compose, the React app may call APIs using relative paths like `/api/auth/...`.
    # In that case, the browser will send requests to the same origin as the frontend
    # (http://localhost:3000/api/...), which must be proxied to the gateway.
    #
    # This block enables: http://localhost:3000/api/*  ->  http://api-gateway/api/*
    #
    # If you host the frontend separately on AWS (S3/CloudFront/Amplify), this nginx file is
    # usually NOT used at all. In that hosting model you should instead either:
    # - Configure a CloudFront/Amplify rewrite/proxy for `/api/*` to your API Gateway, OR
    # - Build the frontend with `REACT_APP_API_GATEWAY_URL=https://<your-domain>` so it calls
    #   the gateway domain directly (not relative `/api/*`).
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # Do not add a trailing slash here, so /api/* paths are preserved
        proxy_pass http://api-gateway;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
