name: Customer Review Service CI-CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - services/customer-review-service/**
      - .github/workflows/customer-review-service.yml
  pull_request:
    branches:
      - main
      - develop
    paths:
      - services/customer-review-service/**
      - .github/workflows/customer-review-service.yml

jobs:
  ci:
    name: Customer Review Service Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/customer-review-service/package-lock.json

      - name: Install customer-review-service dependencies
        run: npm ci --prefix services/customer-review-service

      - name: Build customer-review-service Docker image
        run: docker build -t customer-review-service:ci ./services/customer-review-service

  cd:
    name: Publish Customer Review Service Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push customer-review-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/customer-review-service
          file: ./services/customer-review-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-customer-review-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-customer-review-service:${{ github.sha }}
