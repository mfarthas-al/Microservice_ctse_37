name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    name: Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

  cd:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push event-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/event-service
          file: ./services/event-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-event-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-event-service:${{ github.sha }}

      - name: Build and push booking-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/booking-service
          file: ./services/booking-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-booking-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-booking-service:${{ github.sha }}

      - name: Build and push user-management-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/user-management-service
          file: ./services/user-management-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-user-management-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-user-management-service:${{ github.sha }}

      - name: Build and push customer-review-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/customer-review-service
          file: ./services/customer-review-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-customer-review-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-customer-review-service:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-frontend:${{ github.sha }}
