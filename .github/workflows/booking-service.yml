name: Booking Service CI-CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - services/booking-service/**
      - .github/workflows/booking-service.yml
  pull_request:
    branches:
      - main
      - develop
    paths:
      - services/booking-service/**
      - .github/workflows/booking-service.yml

jobs:
  ci:
    name: Booking Service Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/booking-service/package-lock.json

      - name: Install booking-service dependencies
        run: npm ci --prefix services/booking-service

      - name: Build booking-service Docker image
        run: docker build -t booking-service:ci ./services/booking-service

  cd:
    name: Publish Booking Service Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push booking-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/booking-service
          file: ./services/booking-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-booking-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-booking-service:${{ github.sha }}
