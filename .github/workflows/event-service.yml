name: Event Service CI-CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - services/event-service/**
      - .github/workflows/event-service.yml
  pull_request:
    branches:
      - main
      - develop
    paths:
      - services/event-service/**
      - .github/workflows/event-service.yml

jobs:
  ci:
    name: Event Service Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/event-service/package-lock.json

      - name: Install event-service dependencies
        run: npm ci --prefix services/event-service

      - name: Build event-service Docker image
        run: docker build -t event-service:ci ./services/event-service

  cd:
    name: Publish Event Service Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push event-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/event-service
          file: ./services/event-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-event-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservice-ctse-37-event-service:${{ github.sha }}
